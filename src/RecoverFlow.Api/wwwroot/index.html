<!doctype html>
<html lang="en">
<head>

<link rel="icon" type="image/png" href="assets/logo-mark.png">
<style>

  body {

  .card img { height: 56px; width: 56px; border-radius: 12px; margin-bottom: 20px; }

    font-size: clamp(2rem, 5vw, 2.75rem);
    margin: 0 0 12px;
    letter-spacing: -0.02em;

    color: #9fb0c0;

    border-radius: 8px;

  <div class="card">
